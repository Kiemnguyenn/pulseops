name: Core CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to Dev Environment
        run: |
          if [ -f "docker-compose.yml" ]; then
            docker-compose up -d
            sleep 10
            docker-compose ps
          else
            echo "docker-compose.yml not found, skipping this step."
          fi

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-dev
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Deploy to Prod (Dry-run Mode)
        run: helm template pulseops-prod ./helm/pulseops --values ./helm/pulseops/values-prod.yaml

  notify-slack:
    runs-on: ubuntu-latest
    needs: deploy-prod
    steps:
      - name: Send Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_MESSAGE: 'CD Pipeline completed successfully! Dev & Prod environments have been updated.'
          SLACK_TITLE: 'Successful Deployment (PulseOps)'
          SLACK_COLOR: good
